<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Movie Reviews - Estadísticas</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .grid-estadisticas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .tarjeta-metrica {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-top: 4px solid #570b9d;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
        }
        .valor-metrica {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            margin: 15px 0;
        }
        .tarjeta-metrica h3 {
            color: #570b9d;
            margin: 0;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .descripcion-metrica {
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>XMovies</h1>
        <nav>
            <a href="index.html"><button>Inicio</button></a>
            <a href="buscar.html"><button>Buscar</button></a>
            <a href="generos.html"><button>Géneros</button></a>
            <a href="top10.html"><button>Top 10</button></a>
            <a href="historico.html"><button>Histórico</button></a>
            <a href="acerca.html"><button style="background: #570b9d; color: black; border-color: #570b9d;">Estadísticas</button></a>
        </nav>
    </header>

    <main>
        <h2>Métricas del Servidor de Datos</h2>
        <div class="grid-estadisticas">
            
            <div class="tarjeta-metrica">
                <h3>Volumen de Datos</h3>
                <div id="total-peliculas" class="valor-metrica">...</div>
                <div class="descripcion-metrica">Películas indexadas en peliculas.xml</div>
            </div>

            <div class="tarjeta-metrica">
                <h3>Calificación Promedio</h3>
                <div id="promedio-rating" class="valor-metrica">...</div>
                <div class="descripcion-metrica">Media global de la puntuación crítica</div>
            </div>

            <div class="tarjeta-metrica">
                <h3>Máxima Valoración</h3>
                <div id="mejor-pelicula" class="valor-metrica" style="font-size: 1.5rem; color: #d8b4fe;">...</div>
                <div class="descripcion-metrica">Película con el puntaje más alto del catálogo</div>
            </div>

        </div>
    </main>
</body>
</html>
