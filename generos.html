<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMovies - Géneros</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .contenedor-filtros {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .btn-filtro {
            background-color: #121212;
            color: #ffffff;
            border: 1px solid #2a2a2a;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-filtro:hover, .btn-filtro.activo {
            background-color: #570b9d;
            border-color: #570b9d;
            color: #000000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>XMovies</h1>
        <nav>
            <a href="index.html"><button>Inicio</button></a>
            <a href="buscar.html"><button>Buscar</button></a>
            <a href="generos.html"><button style="background: #570b9d; color: black; border-color: #570b9d;">Géneros</button></a>
            <a href="top10.html"><button>Top 10</button></a>
            <a href="historico.html"><button>Histórico</button></a>
            <a href="acerca.html"><button>Estadísticas</button></a>
        </nav>
    </header>

    <main>
        <h2>Explorar por Categoría</h2>
        
        <div id="botones-generos" class="contenedor-filtros">
            <button class="btn-filtro activo" onclick="filtrarPorGenero('Todos', this)">Todos</button>
        </div>

        <div id="contenedor-peliculas" class="grid-peliculas">
            <p>Clasificando cartelera...</p>
        </div>
    </main>
    <script src="cerebro.js"></script>
    <script>window.onload = cargarGeneros;</script>
</body>
</html>
