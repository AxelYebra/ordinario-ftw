<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFILMS - Top 10</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .ranking-lista {
            max-width: 800px;
            margin: 0 auto;
        }
        .fila-ranking {
            display: flex;
            align-items: center;
            background-color: #121212;
            border: 1px solid #2a2a2a;
            margin-bottom: 12px;
            padding: 15px 25px;
            border-radius: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .fila-ranking:hover {
            transform: scale(1.01);
            border-color: #570b9d;
        }
        .posicion {
            font-size: 1.8rem;
            font-weight: bold;
            color: #570b9d;
            width: 50px;
            flex-shrink: 0;
        }
        .detalles-ranking {
            flex-grow: 1;
        }
        .detalles-ranking h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #ffffff;
        }
        .puntuacion-top {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d8b4fe;
            margin-left: 20px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>XFILMS</h1>
        <nav>
            <a href="index.html"><button>Inicio</button></a>
            <a href="buscar.html"><button>Buscar</button></a>
            <a href="generos.html"><button>Géneros</button></a>
            <a href="top10.html"><button style="background: #570b9d; color: black; border-color: #570b9d;">Top 10</button></a>
            <a href="historico.html"><button>Histórico</button></a>
            <a href="acerca.html"><button>Estadísticas</button></a>
        </nav>
    </header>

    <main>
        <h2 style="text-align: center; margin-bottom: 30px;">Las 10 Películas Mejor Valoradas</h2>
        
        <div id="lista-top10" class="ranking-lista">
            <p style="text-align: center;">Calculando puntuaciones...</p>
        </div>
    </main>

    <script>
        async function cargarTop10() {
            try {
                const respuesta = await fetch('peliculas.xml');
                const textoXML = await respuesta.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(textoXML, "text/xml");
                
                const peliculas = Array.from(xml.getElementsByTagName("pelicula"));

                peliculas.sort((a, b) => {
                    const ratingA = parseFloat(a.getElementsByTagName("puntuacion_general")[0].textContent);
                    const ratingB = parseFloat(b.getElementsByTagName("puntuacion_general")[0].textContent);
                    return ratingB - ratingA;
                });

                const top10 = peliculas.slice(0, 10);
                const contenedor = document.getElementById("lista-top10");
                let htmlContenido = "";

                top10.forEach((pelicula, indice) => {
                    const id = pelicula.getAttribute("id");
                    const titulo = pelicula.getElementsByTagName("titulo")[0].textContent;
                    const director = pelicula.getElementsByTagName("director")[0].textContent;
                    const año = pelicula.getElementsByTagName("año")[0].textContent;
                    const tipo = pelicula.getElementsByTagName("tipo")[0].textContent;
                    const rating = pelicula.getElementsByTagName("puntuacion_general")[0].textContent;

                    htmlContenido += `
                        <div class="fila-ranking">
                            <div class="posicion">#${indice + 1}</div>
                            <div class="detalles-ranking">
                                <h3>${titulo}</h3>
                                <span style="color: #aaa; font-size: 0.9rem;">${año} | ${tipo} | Dir: ${director}</span>
                            </div>
                            <div class="puntuacion-top">★ ${rating}</div>
                            <a class="btn-ver" href="detalle.html?id=${id}" style="margin-top: 0; margin-left: 20px;">Ver Ficha</a>
                        </div>
                    `;
                });

                contenedor.innerHTML = htmlContenido;

            } catch (error) {
                console.error(error);
            }
        }

        window.onload = cargarTop10;
    </script>
</body>
</html>
