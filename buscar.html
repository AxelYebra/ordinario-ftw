<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMovies - Buscar</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .barra-busqueda {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            background-color: #121212;
            border: 2px solid #570b9d;
            border-radius: 25px;
            color: #ffffff;
            margin-bottom: 30px;
            outline: none;
            box-sizing: border-box;
        }
        .barra-busqueda:focus {
            box-shadow: 0 0 10px #570b9d;
        }
        .contenedor-busqueda {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>XMovies</h1>
        <nav style="display: flex; gap: 15px; justify-content: flex-end; padding: 10px;">
            <a href="index.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px;">Inicio</a>
            <a href="buscar.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px;">Buscar</a>
            <a href="generos.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px;">Géneros</a>
            <a href="top10.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px; font-weight: bold;">Top 10</a>
            <a href="historico.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px;">Histórico</a>
            <a href="reseñas.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px;">Reseñas</a>
            <a href="acerca.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px;">Estadísticas</a>
            <a href="perfil.html" style="color: white; text-decoration: none; padding: 8px 16px; background-color: #1a1a1a; border-radius: 4px; border: 1px solid #570b9d;">👤 Mi Perfil</a>
        </nav>
    </header>

    <main class="contenedor-busqueda">
        <h2>Buscador de Películas</h2>
        <input type="text" id="input-buscar" class="barra-busqueda" placeholder="Busca por título o director...">
        
        <div id="contenedor-peliculas" class="grid-peliculas" style="width: 100%;">
            <p>Cargando catálogo...</p>
        </div>
    </main>
    <script src="cerebro.js"></script>
    <script>window.onload = inicializarBuscador;</script>
</body>
</html>
