<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFILMS - Historial</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <h1>XMovies</h1>
        <nav>
            <a href="index.html"><button>Inicio</button></a>
            <a href="buscar.html"><button>Buscar</button></a>
            <a href="generos.html"><button>Géneros</button></a>
            <a href="top10.html"><button>Top 10</button></a>
            <a href="historico.html"><button style="background: #570b9d; color: black; border-color: #570b9d;">Histórico</button></a>
            <a href="acerca.html"><button>Estadísticas</button></a>
        </nav>
    </header>

    <main>
        <h2>Películas Vistas Recientemente</h2>
        <div id="contenedor-historico" class="grid-peliculas">
            <p>Cargando tu historial de navegación...</p>
        </div>
    </main>

    <script>
        async function cargarHistorial() {
            try {
                const historialIds = JSON.parse(localStorage.getItem('historial_xfilms')) || [];
                const contenedor = document.getElementById("contenedor-historico");

                if (historialIds.length === 0) {
                    contenedor.innerHTML = "<p style='color: #777;'>Aún no has visitado ninguna película en esta sesión.</p>";
                    return;
                }

                const respuesta = await fetch('peliculas.xml');
                const textoXML = await respuesta.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(textoXML, "text/xml");

                let htmlContenido = "";

                historialIds.forEach(id => {
                    const pelicula = xml.querySelector(`pelicula[id="${id}"]`);
                    if (pelicula) {
                        const titulo = pelicula.getElementsByTagName("titulo")[0].textContent;
                        const director = pelicula.getElementsByTagName("director")[0].textContent;
                        const año = pelicula.getElementsByTagName("año")[0].textContent;
                        const tipo = pelicula.getElementsByTagName("tipo")[0].textContent;
                        const rating = pelicula.getElementsByTagName("puntuacion_general")[0].textContent;

                        htmlContenido += `
                            <div class="tarjeta-pelicula">
                                <div>
                                    <h3 class="titulo-peli">${titulo}</h3>
                                    <p class="info-peli"><strong>Año:</strong> ${año}</p>
                                    <p class="info-peli"><strong>Género:</strong> ${tipo}</p>
                                    <p class="info-peli"><strong>Director:</strong> ${director}</p>
                                </div>
                                <div>
                                    <div class="rating-peli">★ ${rating}</div>
                                    <a class="btn-ver" href="detalle.html?id=${id}">Ver Ficha</a>
                                </div>
                             </div>
                        `;
                    }
                });

                contenedor.innerHTML = htmlContenido || "<p style='color: #777;'>No se encontraron datos en el historial.</p>";

            } catch (error) {
                console.error(error);
                document.getElementById("contenedor-historico").innerHTML = "<p style='color: red;'>Error al cargar el historial.</p>";
            }
        }

        window.onload = cargarHistorial;
    </script>
</body>
</html>
